<!DOCTYPE html>
<html>
<head>
<title>ShopEasy - Home</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

nav {
    background: white;
    padding: 12px 20px;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
}

nav h2 { font-size: 20px; }

nav .nav-links { display: flex; align-items: center; gap: 14px; }

nav a {
    text-decoration: none;
    color: #333;
    font-size: 14px;
    cursor: pointer;
}

#cartBtn {
    background: #333;
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    position: relative;
}

#cartBadge {
    background: red;
    color: white;
    border-radius: 50%;
    font-size: 11px;
    padding: 1px 5px;
    position: absolute;
    top: -6px;
    right: -6px;
    display: none;
}

.filter-bar {
    background: white;
    padding: 12px 20px;
    border-bottom: 1px solid #ddd;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

.filter-bar input {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    width: 200px;
}

.filter-bar button {
    padding: 8px 15px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: white;
    border-radius: 4px;
    font-size: 14px;
}

.filter-bar button.active {
    background: #333;
    color: white;
    border-color: #333;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    border: 1px solid #ddd;
}

.card .emoji { font-size: 44px; margin-bottom: 8px; }
.card .name { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
.card .category { font-size: 12px; color: #888; margin-bottom: 6px; }
.card .price { font-size: 15px; font-weight: bold; margin-bottom: 10px; }

.card button {
    padding: 8px 15px;
    cursor: pointer;
    background: white;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    width: 100%;
    transition: background 0.15s;
}

.card button:hover { background: #f2f2f2; }
.card button.added { background: #e6ffe6; border-color: #4caf50; color: #2e7d32; }

#message {
    color: red;
    text-align: center;
    margin-top: 30px;
    font-size: 15px;
}

/* Slide-in panel (Cart & Orders) */
.panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
}

.panel-overlay.open { display: block; }

.panel {
    position: fixed;
    top: 0; right: 0;
    width: 360px;
    max-width: 100%;
    height: 100%;
    background: white;
    display: flex;
    flex-direction: column;
    z-index: 201;
    box-shadow: -4px 0 12px rgba(0,0,0,0.15);
    transform: translateX(100%);
    transition: transform 0.25s ease;
}

.panel-overlay.open .panel { transform: translateX(0); }

.panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    font-weight: bold;
}

.panel-header button {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #555;
}

.panel-tabs {
    display: flex;
    border-bottom: 1px solid #ddd;
}

.panel-tabs button {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    color: #888;
}

.panel-tabs button.active {
    border-bottom-color: #333;
    color: #333;
}

.panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}

.cart-item, .order-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}

.cart-item .emoji-sm { font-size: 28px; min-width: 36px; text-align: center; }

.cart-item .details { flex: 1; }
.cart-item .details .item-name { font-size: 14px; font-weight: bold; }
.cart-item .details .item-price { font-size: 13px; color: #555; }

.qty-control {
    display: flex;
    align-items: center;
    gap: 6px;
}

.qty-control button {
    width: 26px; height: 26px;
    border: 1px solid #ccc;
    background: white;
    border-radius: 4px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
}

.qty-control span { font-size: 14px; min-width: 20px; text-align: center; }

.remove-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #999;
    padding: 0 4px;
}

.remove-btn:hover { color: #e53935; }

.empty-msg {
    text-align: center;
    color: #aaa;
    margin-top: 40px;
    font-size: 15px;
}

.panel-footer {
    padding: 16px 20px;
    border-top: 1px solid #ddd;
}

.total-row {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 12px;
}

#placeOrderBtn {
    width: 100%;
    padding: 11px;
    background: #333;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
}

#placeOrderBtn:disabled { background: #aaa; cursor: not-allowed; }

/* Orders tab */
.order-group {
    margin-bottom: 16px;
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
}

.order-group-header {
    background: #f7f7f7;
    padding: 8px 12px;
    font-size: 13px;
    color: #555;
    border-bottom: 1px solid #ddd;
}

.order-group-header strong { color: #333; font-size: 14px; }

.order-product-row {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
}

.order-product-row:last-child { border-bottom: none; }
.order-product-row .emoji-sm { font-size: 22px; min-width: 28px; text-align: center; }
</style>
</head>

<body>

<nav>
    <h2>ShopEasy</h2>
    <div class="nav-links">
        <a onclick="logout()">Logout</a>
        <button id="cartBtn" onclick="openPanel()">
            Cart
            <span id="cartBadge">0</span>
        </button>
    </div>
</nav>

<div class="filter-bar">
    <input type="text" id="search" placeholder="Search products..." oninput="loadProducts()">
    <button class="active" onclick="setCategory('', this)">All</button>
    <button onclick="setCategory('Electronics', this)">Electronics</button>
    <button onclick="setCategory('Clothing', this)">Clothing</button>
    <button onclick="setCategory('Books', this)">Books</button>
    <button onclick="setCategory('Home', this)">Home</button>
    <button onclick="setCategory('Sports', this)">Sports</button>
</div>

<div class="grid" id="grid"></div>
<p id="message"></p>

<!-- Panel overlay -->
<div class="panel-overlay" id="panelOverlay" onclick="onOverlayClick(event)">
  <div class="panel">
    <div class="panel-header">
        <span id="panelTitle">My Cart</span>
        <button onclick="closePanel()">&times;</button>
    </div>
    <div class="panel-tabs">
        <button class="active" id="tabCart" onclick="switchTab('cart')">Cart</button>
        <button id="tabOrders" onclick="switchTab('orders')">Orders</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-footer" id="panelFooter"></div>
  </div>
</div>

<script>
let currentTab = "cart";
const token = localStorage.getItem("token");
const userEmail = localStorage.getItem("email")

let activeCategory = "";
let cart   = JSON.parse(localStorage.getItem("cart")   || "[]");
cart = [];
saveCart();
updateBadge();
loadProducts();
switchTab("orders");



if (!token) {
    window.location.href = "/ecommerce-app/signin.html";
}

function authHeaders() {
    return { "Content-Type": "application/json", "Authorization": "Bearer " + token };
}

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("email");
    localStorage.removeItem("cart");
    window.location.href = "/ecommerce-app/signin.html";
}

function setCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll(".filter-bar button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadProducts();
}

function loadProducts() {
    const search = document.getElementById("search").value;
    const params = new URLSearchParams();
    if (activeCategory) params.append("category", activeCategory);
    if (search)         params.append("search", search);

    fetch("/ecommerce-app/products?" + params.toString(), {
        headers: authHeaders()
    })
    .then(res => res.json())
    .then(data => renderGrid(data))
    .catch(() => {
        document.getElementById("message").innerText = "Failed to load products.";
    });
}

function renderGrid(products) {
    const grid = document.getElementById("grid");
    const msg  = document.getElementById("message");

    if (!products || products.length === 0) {
        grid.innerHTML = "";
        msg.innerText  = "No products found.";
        return;
    }

    msg.innerText  = "";
    grid.innerHTML = products.map(p => {
        const inCart = cart.some(c => c.productId === p.id);
        return `
        <div class="card">
            <div class="name">${p.name}</div>
            <div class="category">${p.category}</div>
            <div class="price">&#8377;${p.price}</div>
            <button id="btn-${p.id}"
                class="${inCart ? 'added' : ''}"
                onclick='addToCart(${JSON.stringify(p)})'>
                ${inCart ? '&#10003; Added' : 'Add to Cart'}
            </button>
        </div>`;
    }).join("");
}

function addToCart(product) {
    const existing = cart.find(c => c.productId === product.id);
    if (existing) {
        existing.quantity++;
    } else {
        cart.push({
            productId:   product.id,
            productName: product.name,
            price:       product.price,
            emoji:       getEmoji(product),
            quantity:    1
        });
    }
    saveCart();
    updateBadge();

    const btn = document.getElementById("btn-" + product.id);
    if (btn) {
        btn.classList.add("added");
        btn.innerText = " Added";
    }
}

function changeQty(productId, delta) {
    const item = cart.find(c => c.productId === productId);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) {
        cart = cart.filter(c => c.productId !== productId);
    }
    saveCart();
    updateBadge();
    renderCartTab();
    loadProducts();
}

function removeFromCart(productId) {
    cart = cart.filter(c => c.productId !== productId);
    saveCart();
    updateBadge();
    renderCartTab();
    loadProducts();
}

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function updateBadge() {
    const total = cart.reduce((s, c) => s + c.quantity, 0);
    const badge = document.getElementById("cartBadge");
    badge.style.display = total > 0 ? "inline" : "none";
    badge.innerText = total;
}

function openPanel() {
    currentTab = "cart";
    document.getElementById("tabCart").classList.add("active");
    document.getElementById("tabOrders").classList.remove("active");
    renderCartTab();
    document.getElementById("panelOverlay").classList.add("open");
}

function closePanel() {
    document.getElementById("panelOverlay").classList.remove("open");
}

function onOverlayClick(e) {
    if (e.target === document.getElementById("panelOverlay")) closePanel();
}

function switchTab(tab) {
    currentTab = tab;
    document.getElementById("tabCart").classList.toggle("active", tab === "cart");
    document.getElementById("tabOrders").classList.toggle("active", tab === "orders");
    if (tab === "cart") renderCartTab();
    else renderOrdersTab();
}

function renderCartTab() {
    const body   = document.getElementById("panelBody");
    const footer = document.getElementById("panelFooter");

    if (cart.length === 0) {
        body.innerHTML = '<p class="empty-msg">Your cart is empty.</p>';
        footer.innerHTML = "";
        return;
    }

    body.innerHTML = cart.map(item => `
        <div class="cart-item">
            <div class="details">
                <div class="item-name">${item.productName}</div>
                <div class="item-price">&#8377;${(item.price * item.quantity).toFixed(2)}</div>
            </div>
            <div class="qty-control">
                <button onclick="changeQty(${item.productId}, -1)">&#8722;</button>
                <span>${item.quantity}</span>
                <button onclick="changeQty(${item.productId}, 1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeFromCart(${item.productId})">&#215;</button>
        </div>
    `).join("");

    const total = cart.reduce((s, c) => s + c.price * c.quantity, 0);
    footer.innerHTML = `
        <div class="total-row">
            <span>Total</span>
            <span>&#8377;${total.toFixed(2)}</span>
        </div>
        <button id="placeOrderBtn" onclick="placeOrder()">Place Order</button>
    `;
}

function placeOrder() {
    if (cart.length === 0) return;

    const btn = document.getElementById("placeOrderBtn");
    btn.disabled = true;
    btn.innerText = "Placing...";

    const payload = cart.map(c => ({
        productId:   c.productId,
        productName: c.productName,
        price:       c.price,
        quantity:    c.quantity
    }));

    fetch("/ecommerce-app/orders", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify(payload)
    })
    .then(res => res.text())
    .then(result => {
        if (result === "ORDER_PLACED") {
            orders.unshift({
                id:    Date.now(),
                date:  new Date().toLocaleString(),
                items: [...cart],
                total: cart.reduce((s, c) => s + c.price * c.quantity, 0)
            });
            localStorage.setItem("orders", JSON.stringify(orders));

            cart = [];
            saveCart();
            updateBadge();
            loadProducts();
            switchTab("orders");
        } else {
            btn.disabled = false;
            btn.innerText = "Place Order";
            alert("Order failed: " + result);
        }
    })
    .catch(() => {
        btn.disabled = false;
        btn.innerText = "Place Order";
        alert("Network error, please try again.");
    });
}

function renderOrdersTab() {
    const body   = document.getElementById("panelBody");
    const footer = document.getElementById("panelFooter");
    footer.innerHTML = "";

    if (orders.length === 0) {
        body.innerHTML = '<p class="empty-msg">No orders yet.</p>';
        return;
    }

    body.innerHTML = orders.map(order => `
        <div class="order-group">
            <div class="order-group-header">
                <strong>Order #${order.id}</strong> &nbsp;&middot;&nbsp; ${order.date}
                &nbsp;&middot;&nbsp; <strong>&#8377;${order.total.toFixed(2)}</strong>
            </div>
            ${order.items.map(item => `
                <div class="order-product-row">
                    <span style="flex:1">${item.productName}</span>
                    <span>x${item.quantity}</span>
                    <span style="margin-left:8px;color:#555">&#8377;${(item.price * item.quantity).toFixed(2)}</span>
                </div>
            `).join("")}
        </div>
    `).join("");
}

updateBadge();
loadProducts();


function renderOrdersTab() {
    const body = document.getElementById("panelBody");
    document.getElementById("panelFooter").innerHTML = "";
    body.innerHTML = '<p class="empty-msg">Loading...</p>';

    fetch("/ecommerce-app/orders", { headers: authHeaders() })
    .then(res => res.json())
    .then(orders => {
        if (!orders || orders.length === 0) {
            body.innerHTML = '<p class="empty-msg">No orders yet.</p>';
            return;
        }
        body.innerHTML = orders.map(order => `
            <div class="order-group">
                <div class="order-group-header">
                    <strong>Order #${order.id}</strong> &nbsp;&middot;&nbsp; ${order.createdAt}
                    &nbsp;&middot;&nbsp; <strong>&#8377;${order.total.toFixed(2)}</strong>
                </div>
                ${order.items.map(item => `
                    <div class="order-product-row">
                        <span style="flex:1">${item.productName}</span>
                        <span>x${item.quantity}</span>
                        <span style="margin-left:8px;color:#555">&#8377;${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                `).join("")}
            </div>
        `).join("");
    })
    .catch(() => {
        body.innerHTML = '<p class="empty-msg">Failed to load orders.</p>';
    });
}
</script>

</body>
</html>
